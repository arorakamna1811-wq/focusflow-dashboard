<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FocusFlow Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>FocusFlow</h1>

    <div class="card">
        <h2>Today's Tasks</h2>
        <ul>
            <li>Workout at 6 PM</li>
            <li>Study Python</li>
            <li>Drink 3L Water</li>
        </ul>
    </div>

    <div class="card">
        <h2>Pomodoro Timer</h2>
        <div class="timer">25:00</div>
        <button>Start</button>
    </div>

    <div class="card">
        <h2>Daily Quote</h2>
        <p>"Discipline beats motivation."</p>
    </div>
</div>

</body>
</html>
